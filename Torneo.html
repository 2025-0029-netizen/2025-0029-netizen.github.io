<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Continental - Torneo</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="Torneo.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">⚡ EL CONTINENTAL</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="clanes.html">Clanes</a></li>
                <li><a href="ranking.html">Ranking</a></li>
                <li><a href="salas.html">Salas</a></li>
                <li><a href="https://forms.gle/6PdbKF8PYXojmiov9" target="_blank" class="cta-button">✚ Registrar Clan</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="tournament-header">
        <h1>🏆 TORNEO CONTINENTAL 2025</h1>
        <div class="tournament-info">
            <div class="info-item">
                <span class="info-label">Fecha</span>
                <span class="info-value">15 - 22 Enero</span>
            </div>
            <div class="info-item">
                <span class="info-label">Equipos</span>
                <span class="info-value">16</span>
            </div>
            <div class="info-item">
                <span class="info-label">Formato</span>
                <span class="info-value">Eliminación Simple</span>
            </div>
            <div class="info-item">
                <span class="info-label">Premio</span>
                <span class="info-value">$5,000</span>
            </div>
        </div>
    </div>

    <!-- El bracket se genera dinámicamente desde Google Sheets (torneo.js) -->
    <div class="bracket-container" id="bracketContainer">
    </div>

    <footer>
        <p>© 2025 El Continental - Comunidad Élite de Call of Duty Mobile</p>
    </footer>

    <script src="config-global.js"></script>
    <script src="torneo.js"></script>
    <script>
        // Scroll centrado al terminar de cargar el bracket
        window.addEventListener('load', () => {
            setTimeout(() => {
                const bracket = document.querySelector('.bracket-container');
                if (bracket) bracket.scrollLeft = (bracket.scrollWidth - bracket.clientWidth) / 2;
            }, 500);
        });
    </script>
</body>
</html>
